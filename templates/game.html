<script>
    // Balance ကို စစ်ဆေးပြီး ဂဏန်းမဟုတ်ရင် ၁၀၀၀၀ လို့ သတ်မှတ်ပေးမယ်
    let currentBalance = parseInt(document.getElementById('balance').innerText);
    if (isNaN(currentBalance)) {
        document.getElementById('balance').innerText = "10000";
    }

    function spin() {
        const reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
        const message = document.getElementById('message');
        const btn = document.querySelector('.btn-spin');
        const balanceSpan = document.getElementById('balance');

        let balance = parseInt(balanceSpan.innerText);

        if (balance < 500) {
            alert("ပိုက်ဆံမလောက်တော့ဘူး ငါ့ကောင်!");
            return;
        }

        // Animation စမယ်
        reels.forEach(r => r.classList.add('spinning'));
        message.innerText = "လှည့်နေပြီ...";
        btn.disabled = true;

        fetch('/spin', { method: 'POST' })
        .then(res => res.json())
        .then(data => {
            setTimeout(() => {
                reels.forEach(r => r.classList.remove('spinning'));
                
                // ရလဒ်တွေ ပြမယ်
                reels[0].innerText = data.reels[0];
                reels[1].innerText = data.reels[1];
                reels[2].innerText = data.reels[2];

                // Balance ကို update လုပ်မယ်
                balanceSpan.innerText = data.balance;

                if (data.won) {
                    message.innerText = "💰 နိုင်ပြီ! " + data.win_amount + " MMK ရတယ်! 💰";
                    message.style.color = "#00ff00";
                } else {
                    message.innerText = "ထပ်စမ်းကြည့်ပါဦး!";
                    message.style.color = "#ffd700";
                }
                
                btn.disabled = false;
            }, 800); 
        })
        .catch(err => {
            // Error တက်ရင်လည်း ပုံမှန်အတိုင်း ပြန်ဖြစ်အောင်လုပ်မယ်
            reels.forEach(r => r.classList.remove('spinning'));
            btn.disabled = false;
            console.error(err);
        });
    }
</script>
